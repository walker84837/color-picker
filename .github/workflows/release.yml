name: release
on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install wxWidgets
        run: sudo apt-get update && sudo apt-get install -y libwxgtk3.2-dev

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: build-release/color_picker
          generate_release_notes: true
